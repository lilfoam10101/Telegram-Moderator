name: Notify Telegram on Update

on:
  push:
    branches: [main, master]
  pull_request:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Send update to Telegram topic
        env:
          NOTIFY_BOT_TOKEN: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$NOTIFY_BOT_TOKEN" ] || [ -z "$CHAT_ID" ] || [ -z "$TOPIC_ID" ]; then
            echo "Telegram notify secrets not configured. Skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"

          python3 <<'PY'
          import html
          import json
          import os
          import urllib.request

          event = os.environ["EVENT_NAME"]
          repo = html.escape(os.environ["REPO"])
          branch = html.escape(os.environ["BRANCH"])
          actor = html.escape(os.environ["ACTOR"])
          run_url = os.environ["RUN_URL"]

          if event == "push":
              short_sha = os.environ["COMMIT_SHA"][:7]
              commit_url = os.environ.get("COMMIT_URL") or run_url
              commit_msg = html.escape((os.environ.get("COMMIT_MSG") or "No commit message").splitlines()[0])
              author = html.escape(os.environ.get("COMMIT_AUTHOR") or actor)
              title = "Bot updated (push)"
              body = (
                  f"<b>Repo:</b> {repo}\n"
                  f"<b>Branch:</b> {branch}\n"
                  f"<b>Commit:</b> <a href=\"{html.escape(commit_url)}\">{short_sha}</a>\n"
                  f"<b>Author:</b> {author}\n"
                  f"<b>Message:</b> {commit_msg}"
              )
          else:
              pr_title = html.escape(os.environ.get("PR_TITLE") or "Merged pull request")
              pr_url = html.escape(os.environ.get("PR_URL") or run_url)
              pr_number = html.escape(os.environ.get("PR_NUMBER") or "?")
              title = "Bot updated (pull request merged)"
              body = (
                  f"<b>Repo:</b> {repo}\n"
                  f"<b>Branch:</b> {branch}\n"
                  f"<b>PR:</b> <a href=\"{pr_url}\">#{pr_number}</a>\n"
                  f"<b>Title:</b> {pr_title}\n"
                  f"<b>Merged by:</b> {actor}"
              )

          text = f"🔄 <b>{title}</b>\n\n{body}\n\n<a href=\"{html.escape(run_url)}\">View GitHub Action</a>"

          payload = {
              "chat_id": os.environ["CHAT_ID"],
              "message_thread_id": int(os.environ["TOPIC_ID"]),
              "parse_mode": "HTML",
              "text": text,
              "disable_web_page_preview": True,
          }

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['NOTIFY_BOT_TOKEN']}/sendMessage",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read().decode("utf-8"))
              if not result.get("ok"):
                  raise RuntimeError(result)
              print("Telegram notification sent.")
          PY
